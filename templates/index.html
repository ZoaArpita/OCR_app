<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to Text OCR</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-2xl bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl p-6 sm:p-8 space-y-6">

        <!-- Header -->
        <div class="text-center space-y-2">
            <h1 class="text-3xl font-bold tracking-tight text-white sm:text-4xl">Image to Text</h1>
            <p class="text-slate-400 text-sm">Upload an image to extract structured text using OCR</p>
        </div>

        <!-- Form -->
        <form method="POST" enctype="multipart/form-data" class="space-y-5">

            <!-- Custom File Input Box -->
            <div class="relative border-2 border-dashed border-slate-700 hover:border-indigo-500 rounded-xl p-6 text-center cursor-pointer transition bg-slate-800/50 hover:bg-slate-800/80 group">
                <input
                    type="file"
                    name="image"
                    id="imageInput"
                    accept="image/*"
                    required
                    class="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                    onchange="updateFileName(this)"
                >
                <div class="space-y-2 pointer-events-none">
                    <svg class="mx-auto h-10 w-10 text-slate-400 group-hover:text-indigo-400 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                    </svg>
                    <p id="fileNameDisplay" class="text-sm font-medium text-slate-300">
                        <span class="text-indigo-400 font-semibold">Click to upload</span>
                    </p>
                    <p class="text-xs text-slate-500">PNG or JPEG</p>
                </div>
            </div>

            <!-- Submit Button -->
            <button
                type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 px-4 rounded-xl transition duration-200 shadow-lg shadow-indigo-600/30 flex items-center justify-center gap-2">
                <span>Extract Text</span>
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                </svg>
            </button>
        </form>

        <!-- Extracted Text Output Section -->
        {% if extracted_text %}
        <div class="space-y-2 pt-4 border-t border-slate-800">
            <div class="flex items-center justify-between">
                <h2 class="text-sm font-semibold text-slate-300 uppercase tracking-wider">Extracted Result</h2>
                <button
                    onclick="copyToClipboard()"
                    class="text-xs bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 py-1.5 rounded-lg border border-slate-700 transition flex items-center gap-1">
                    📋 <span id="copyBtnText">Copy</span>
                </button>
            </div>

            <pre id="ocrResult" class="bg-slate-950 border border-slate-800 text-slate-200 p-4 rounded-xl text-sm font-mono overflow-x-auto whitespace-pre-wrap break-words max-h-60">{{ extracted_text }}</pre>
        </div>
        {% endif %}

    </div>

    <script>
        function updateFileName(input) {
            const display = document.getElementById('fileNameDisplay');
            if (input.files && input.files[0]) {
                display.innerHTML = `<span class="text-indigo-400 font-semibold">Selected file:</span> ${input.files[0].name}`;
            }
        }

        function copyToClipboard() {
            const text = document.getElementById('ocrResult').innerText;
            navigator.clipboard.writeText(text).then(() => {
                const btnText = document.getElementById('copyBtnText');
                btnText.innerText = 'Copied!';
                setTimeout(() => { btnText.innerText = 'Copy'; }, 2000);
            });
        }
    </script>
</body>
</html>
